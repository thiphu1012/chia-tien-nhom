name: CI / Deploy

# PRs to main are validated (typecheck + tests) but NOT deployed — a PR is a
# proposal, not merged code. Deploy runs only on push to main (i.e. when a PR
# merges), so production always reflects what's actually on main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history so the migrations-changed diff below works
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Guard against DEV_MODE in production config
        # CLAUDE.md invariant: DEV_MODE must be OFF in any real deploy (it skips
        # initData signature checks). Fail loudly if it's ever committed as "true".
        run: |
          if grep -qE '^\s*DEV_MODE\s*=\s*"true"' wrangler.toml; then
            echo "::error file=wrangler.toml::DEV_MODE=\"true\" must never be committed — it disables initData verification."
            exit 1
          fi
      - name: Remind if migrations changed
        # Migrations (migrations/*.sql) are one-shot / non-idempotent, so CI does
        # NOT auto-run them. Surface a warning so nobody forgets the manual step.
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "No comparable base commit — skipping migrations check."; exit 0
          fi
          if git diff --name-only "$BASE" HEAD | grep -q '^migrations/'; then
            echo "::warning::migrations/*.sql changed — run 'npm run db:migrate:remote' against the live D1 after this merges (CI does not auto-migrate)."
          fi

  deploy:
    name: Deploy to Cloudflare
    # Only on merge to main, and only if checks passed.
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    concurrency: deploy-production # never two overlapping production deploys
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Deploy Worker + Mini App
        # One `wrangler deploy` publishes the Worker and the public/ assets (via the
        # ASSETS binding) to the stable workers.dev URL. Runtime secrets (BOT_TOKEN,
        # WEBHOOK_SECRET) already live in Cloudflare and persist — CI never sets them.
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
